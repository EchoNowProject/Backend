services:
  soketi:
    image: "quay.io/soketi/soketi:latest-16-alpine"
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
      SOKETI_DEFAULT_APP_ID: "echonow-app-id"
      SOKETI_DEFAULT_APP_KEY: "echonow-app-key"
      SOKETI_DEFAULT_APP_SECRET: "echonow-app-secret"
    ports:
      - "${PUSHER_PORT:-6001}:6001"
      - "${PUSHER_METRICS_PORT:-9601}:9601"
    networks:
      - sail
networks:
  sail:
    driver: bridge
